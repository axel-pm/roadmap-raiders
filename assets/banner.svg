<svg xmlns="http://www.w3.org/2000/svg" width="560" height="200" viewBox="0 0 560 200" role="img" aria-label="Roadmap Raiders">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1030"/>
      <stop offset="1" stop-color="#0d0820"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff5f6d"/>
      <stop offset="1" stop-color="#ffc371"/>
    </linearGradient>
  </defs>
  <rect width="560" height="200" fill="url(#bg)"/>
  <!-- pixel grid glow -->
  <g fill="#2a1a4a" opacity="0.5">
    <rect x="0" y="150" width="560" height="4"/>
    <rect x="0" y="160" width="560" height="2"/>
  </g>
  <!-- floating cards -->
  <g opacity="0.9">
    <rect x="60" y="52" width="46" height="64" rx="6" fill="#241640" stroke="#5b3fa6" stroke-width="2" transform="rotate(-12 83 84)"/>
    <rect x="454" y="52" width="46" height="64" rx="6" fill="#241640" stroke="#c9508a" stroke-width="2" transform="rotate(12 477 84)"/>
  </g>
  <text x="280" y="88" text-anchor="middle" font-family="'Press Start 2P','Courier New',monospace" font-size="30" font-weight="700" fill="url(#ink)" letter-spacing="1">ROADMAP</text>
  <text x="280" y="126" text-anchor="middle" font-family="'Press Start 2P','Courier New',monospace" font-size="30" font-weight="700" fill="url(#ink)" letter-spacing="1">RAIDERS</text>
  <text x="280" y="168" text-anchor="middle" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" fill="#b9a7e8">Battle PM monsters with podcast wisdom</text>
</svg>
